<main class="alarmManager content">
    <div class="alarmManager__alarms">
        @for (alarm of alarmsSignal(); track alarm.value.day) {
            <app-alarm [form]="alarm"></app-alarm>
        }
    </div>
    
    <div class="alarmManager__buttonWrapper">
        <button class="button" (click)="save()">Save</button>
    </div>
</main>
